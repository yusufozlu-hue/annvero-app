# ANNVERO staging-only otomatik Storage backup
# Production ref / secret kullanılmaz. origin/main deploy tetiklemez (docs/scripts branch).
#
# Gerekli GitHub Environment secrets (staging-backup):
#   STAGING_SUPABASE_URL
#   STAGING_SUPABASE_SERVICE_ROLE_KEY
# Gerekli GitHub Environment variables (staging-backup):
#   AWS_ROLE_ARN
#   AWS_REGION                    (örn. eu-central-1)
#   BACKUP_SECONDARY_S3_BUCKET   (örn. annvero-immutable-backup-tr-20260723)
# İsteğe bağlı secrets:
#   BACKUP_SECONDARY_DIR
#   BACKUP_ENCRYPTION_KEY
#
# AWS: GitHub OIDC → role assume. Access key YOK.
# S3 bucket default Object Lock COMPLIANCE 35g; IAM rolünde object silme yok.

name: annvero-staging-storage-backup

on:
  schedule:
    # UTC 03:00 daily — staging RPO hedefi ≤ 24s
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run (no network) or live (staging drill)"
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - live
  # Staging kanıt tetikleyicisi — yalnız bu branch + bu workflow dosyası
  push:
    branches:
      - security/staging-hardening
    paths:
      - .github/workflows/staging-storage-backup.yml

concurrency:
  group: annvero-staging-storage-backup
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # GitHub schedule yalnız default branch'teki workflow'u çalıştırır. Default
  # branch (main) staging Environment secret'larına doğrudan girmez; bunun
  # yerine sabit ve korumalı staging ref'inde workflow_dispatch üretir.
  dispatch-staging-schedule:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch protected staging ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/staging-storage-backup.yml/dispatches" \
            -f ref=security/staging-hardening \
            -f 'inputs[mode]=live'

  staging-storage-backup:
    # Schedule parent job secret kullanmaz. Gerçek yedek sabit staging ref'inde
    # oluşturulan workflow_dispatch çalışmasında yürür.
    if: ${{ github.event_name != 'schedule' && github.ref == 'refs/heads/security/staging-hardening' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging-backup
    permissions:
      contents: read
      id-token: write
    steps:
      # Pin: actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # Pin: actions/setup-node v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve mode
        id: mode
        run: |
          # push → live; workflow_dispatch → input (schedule ayrı dispatch job'unda)
          EVENT_NAME="${{ github.event_name }}"
          if [ "$EVENT_NAME" = "push" ]; then
            MODE="live"
          else
            MODE="${{ github.event.inputs.mode }}"
            if [ -z "$MODE" ]; then MODE="live"; fi
          fi
          echo "value=$MODE" >> "$GITHUB_OUTPUT"
          echo "event=${EVENT_NAME} mode=${MODE}"

      - name: Staging storage backup
        id: backup
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          BACKUP_SECONDARY_DIR: ${{ secrets.BACKUP_SECONDARY_DIR }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ./backup-artifacts
          # Secret değerlerini echo etme
          node scripts/backup/staging-storage-backup.mjs \
            --mode "${{ steps.mode.outputs.value }}" \
            --out ./backup-artifacts \
            --run-id "$(date -u +%Y%m%dT%H%M%SZ)"

      # Pin: aws-actions/configure-aws-credentials v4.3.1
      - name: Configure AWS credentials (OIDC)
        if: ${{ steps.mode.outputs.value == 'live' && success() }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload immutable S3 secondary + verify
        if: ${{ steps.mode.outputs.value == 'live' && success() }}
        env:
          BACKUP_SECONDARY_S3_BUCKET: ${{ vars.BACKUP_SECONDARY_S3_BUCKET }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # Access key yok; secret echo yok. S3 delete denenmez.
          node scripts/backup/upload-immutable-s3.mjs \
            --out ./backup-artifacts \
            --github-run-id "${GITHUB_RUN_ID}"

      - name: Upload backup artifacts (checksum manifests)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: staging-storage-backup-${{ github.run_id }}
          path: backup-artifacts/
          if-no-files-found: warn
          retention-days: 35
