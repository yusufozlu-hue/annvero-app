name: annvero-security-gates

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Top-level varsayılan: en dar yetki
permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Pin: actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # Pin: actions/setup-node v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3f2eb4ae
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        run: node scripts/security/scan-secrets.mjs

      - name: Client secret scan
        run: node scripts/security/scan-client-secrets.mjs

      - name: Destructive SQL scan
        run: node scripts/security/scan-destructive-sql.mjs

      - name: Critical route checks
        run: node scripts/security/check-critical-routes.mjs

      - name: Security regression tests
        run: npm run test:security

      - name: Auth security gates
        run: node scripts/test-auth-security-gates.mjs

      - name: Company membership security
        run: node scripts/test-company-membership-security.mjs

      - name: Backup dry-run (DB + Storage + staging guard)
        run: |
          npm run backup:dry-run
          npm run backup:storage-dry-run
          npm run backup:staging-storage:dry-run

      - name: Bank parser regression
        run: npm run test:bank-parser

      - name: Cari BILET DUKKANI regression
        run: npm run test:cari-biletduk

      - name: Lint changed security paths
        run: npm run lint:security
        continue-on-error: false

      - name: Dependency audit (high/critical)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Production build
        run: npm run build
        env:
          ANNVERO_APP_ENV: development
          NEXT_PUBLIC_SUPABASE_URL: https://local-dev-project.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_local_dev_placeholder_key_000
