name: ANNVERO Deploy Monitor

on:
  deployment_status:

permissions:
  contents: read

jobs:
  notify-failure:
    # GitHub Environment koruma hataları da deployment_status üretir.
    # Yalnız Vercel hedef URL'si taşıyan gerçek deploy olaylarını raporla.
    if: >-
      (github.event.deployment_status.state == 'failure' ||
      github.event.deployment_status.state == 'error') &&
      startsWith(github.event.deployment_status.target_url, 'https://vercel.com/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Report failed deployment
        env:
          DEPLOY_STATE: ${{ github.event.deployment_status.state }}
          DEPLOY_ENV: ${{ github.event.deployment_status.environment }}
          DEPLOY_SHA: ${{ github.event.deployment_status.sha }}
          # description/target_url shell interpolation yerine env — injection riskini azaltır
          DEPLOY_DESC: ${{ github.event.deployment_status.description }}
          DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          echo "::error title=ANNVERO Deploy Failed::Vercel deployment failed for commit ${DEPLOY_SHA}."
          {
            echo "## ANNVERO deploy hatasi"
            echo ""
            echo "- Durum: ${DEPLOY_STATE}"
            echo "- Ortam: ${DEPLOY_ENV}"
            echo "- Commit: \`${DEPLOY_SHA}\`"
            echo "- Aciklama: ${DEPLOY_DESC}"
            echo "- Vercel: ${DEPLOY_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
